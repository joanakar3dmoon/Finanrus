name: Build FINANRUS APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install deps
        run: npm install
      - name: Install EAS
        run: npm install -g eas-cli
      - name: Build APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas build -p android --profile preview --non-interactive
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FINANRUS-APK
          path: ./*.apk
